<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <meta content="width=device-width, initial-scale=1.0, maximum-scale=5.0" name="viewport">

    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    <meta name="description" content="Blog của Nguyễn Kim Bảo (BaoIT)">
    <meta name="keywords"
        content="Python, HTML, CSS, Javascript, Image Classification, Tensorflow, Keras, SQL, PostgreSQL, SQL, ASP.NET Core MVC, .NET6, .NET7, Nguyen Kim Bao, Kim Bao, BaoIT, nguyen kim bao, kim bao, baoit">
    <meta name="author" content="Nguyễn Kim Bảo (BaoIT)">
    <meta property="og:title" content="Nguyễn Kim Bảo">
    <meta property="og:description" content="Ứng dụng quản lý dự án của Nguyễn Kim Bảo">
    <meta property="og:image" content="https://baoit.xyzassets/favicon/favicon-32x32.png">

    <meta name="twitter:title" content="Nguyễn Kim Bảo">

    <link rel="dns-prefetch" href="https://jsdelivr.b-cdn.net">
    <link rel="stylesheet" href="/assets/css/style.min.css" fetchpriority="high">
    <link rel="stylesheet" href="/assets/css/twemoji-awesome.min.css" fetchpriority="high">
    <script src="https://jsdelivr.b-cdn.net/npm/jquery@3.7.1/dist/jquery.min.js" fetchpriority="high"></script>
    <script src="/assets/js/common.js" fetchpriority="high"></script>
</head>

<body class="antialiased text-black bg-white dark:bg-dark dark:text-white">
    <!--NavBar-->
    <nav data-accordion="collapse"></nav>
    <div class="max-w-3xl px-3 mx-auto md:max-w-4xl xl:max-w-5xl sm:px-6 xl:px-0">
        <div class="flex flex-col justify-between">
            <main class="min-h-[calc(100vh-16rem)] z-10">
                <div class="relative flex bg-gray-100 dark:bg-gray-900 rounded-2xl h-[90vh]">
                    <button class="absolute top-0 left-0 z-40 p-2 bg-gray-200 rounded-lg md:hidden dark:bg-gray-600"
                        id="btnChonTienIch">
                        <i class="inline-block twa twa-lg twa-hammer-and-wrench"></i> Chọn tiện ích </button>
                    <div class="absolute top-0 left-0 z-30 w-1/4 h-full p-2 overflow-y-auto transition-transform duration-300 ease-in-out -translate-x-full bg-gray-200 rounded-lg dark:bg-gray-800 md:static md:translate-x-0"
                        id="sidebarTienIch">
                        <div class="grid grid-cols-4 gap-3" id="searchBar">
                            <input type="text"
                                class="col-span-3 px-2 py-1 text-black border-2 border-gray-400 rounded-md focus:outline-none focus:border-blue-500 focus:ring-blue-500 bg-gray-50 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
                                placeholder="Tìm tiện ích...">
                            <button type="button"
                                class="px-4 py-2 text-sm font-medium text-white bg-blue-700 rounded-lg hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800">0</button>
                        </div>
                        <hr class="mt-3 border-gray-500 rounded border-1">
                        <ul class="mt-10 font-medium sm:mt-0" data-accordion="collapse" id="sidebarTienIch"
                            data-active-classes="bg-gray-300 dark:bg-gray-700 text-black dark:text-white duration-300"
                            data-inactive-classes="text-black dark:text-white duration-300">
                            <li class="my-3">
                                <a href="#" data-accordion-target="#qrCode_APP" aria-expanded="true"
                                    class="flex items-center p-2 rounded-lg">
                                    <img class="inline-block ml-0.5" src="/assets/images/qr.svg" width="22" height="22">
                                    <span class="ml-2 text-sm">QR Code Generator</span>
                                </a>
                            </li>
                            <li class="my-3">
                                <a href="#" class="flex items-center p-2 rounded-lg"
                                    data-accordion-target="#base64_APP">
                                    <img class="inline-block ml-0.5" src="/assets/images/code-review.svg" width="22"
                                        height="22">
                                    <span class="ml-2 text-sm">Base64 Encoder/Decoder</span>
                                </a>
                            </li>
                            <li class="my-3">
                                <a href="#" class="flex items-center p-2 rounded-lg ">
                                    <img class="inline-block ml-0.5" src="/assets/images/shuffle.svg" width="22"
                                        height="22">
                                    <span class="ml-2 text-sm">Random String Generator</span>
                                </a>
                            </li>
                            <li class="my-3">
                                <a href="#" class="flex items-center p-2 rounded-lg ">
                                    <img class="inline-block ml-0.5" src="/assets/images/padlock.svg" width="22"
                                        height="22">
                                    <span class="ml-2 text-sm">Password Generator</span>
                                </a>
                            </li>
                            <li class="my-3">
                                <a href="#" class="flex items-center p-2 rounded-lg ">
                                    <img class="inline-block ml-0.5" src="/assets/images/generative-image.svg"
                                        width="22" height="22">
                                    <span class="ml-2 text-sm">IMG-to-PDF Converter</span>
                                </a>
                            </li>
                            <li class="my-3">
                                <a href="#" class="flex items-center p-2 rounded-lg " data-accordion-target="#utf8_APP">
                                    <img class="inline-block ml-0.5" src="/assets/images/utf8.svg" width="22"
                                        height="22">
                                    <span class="ml-2 text-sm">UTF-8 Encoder/Decoder</span>
                                </a>
                            </li>
                            <li class="my-3">
                                <a href="#" class="flex items-center p-2 rounded-lg ">
                                    <img class="inline-block ml-0.5" src="/assets/images/data-encryption.svg" width="22"
                                        height="22">
                                    <span class="ml-2 text-sm">SHA Encrypt/Decrypt</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                    <!--QR APP-->
                    <div class="flex-1 mt-10 overflow-y-auto xl:px-5 md:mt-0" id="qrCode_APP">
                        <div id="qrInput"
                            class="p-4 space-y-3 border-2 border-orange-500 rounded-lg dark:border-orange-800">
                            <div class="relative w-full">
                                <textarea rows="6" name="qrNoiDung"
                                    class="textarea_counter block p-2.5 pb-8 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                    placeholder="Nội dung cần tạo QR..."></textarea>
                                <span
                                    class="char_counter absolute bottom-0 right-2.5 p-2.5 font-bold text-sm text-gray-500">0
                                    kí
                                    tự</span>
                            </div>
                            <div class="grid gap-4 md:grid-cols-4 sm:grid-cols-2">
                                <div class="col-span-2">
                                    <label for="qrTieuDe"
                                        class="block text-sm font-medium text-black dark:text-white">Tiêu đề</label>
                                    <input type="text" name="qrTieuDe"
                                        class="mt-2 block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
                                </div>
                                <div class="col-span-2">
                                    <label for="qrTieuDeCon"
                                        class="block text-sm font-medium text-black dark:text-white">Tiêu
                                        đề con</label>
                                    <input type="text" name="qrTieuDeCon"
                                        class="mt-2 block p-2.5 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
                                </div>
                                <div class="col-span-2">
                                    <label for="qrMauSac"
                                        class="block text-sm font-medium text-black dark:text-white">Màu sắc</label>
                                    <input type="color" name="qrMauSac" value="#000000"
                                        class="block w-full p-5 mt-2 text-sm text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
                                </div>
                                <div class="col-span-2">
                                    <label for="qrChenAnh"
                                        class="block text-sm font-medium text-black dark:text-white">Chèn ảnh</label>
                                    <input
                                        class="block w-full mt-2 text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 dark:text-gray-400 focus:outline-none dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400"
                                        name="qrChenAnh" type="file">
                                </div>
                            </div>
                        </div>
                        <div id="qrOutput"
                            class="flex-col items-center justify-center hidden p-4 py-12 mt-4 bg-gray-100 border-2 border-red-400 rounded-lg dark:bg-gray-800">
                            <div id="qrCode" class="pb-6"></div>
                            <div id="qrDownload"></div>
                        </div>
                    </div>
                    <!--BASE64 APP-->
                    <div class="flex-1 hidden mt-10 overflow-y-auto xl:px-5 md:mt-0" id="base64_APP">
                        <div id="base64Input"
                            class="p-4 space-y-3 border-2 border-orange-500 rounded-lg dark:border-orange-800">
                            <div class="relative w-full">
                                <textarea rows="6" name="base64NoiDung"
                                    class="textarea_counter block p-2.5 pb-8 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                    placeholder="Nội dung cần Encode/Decode..."></textarea>
                                <span
                                    class="char_counter absolute bottom-0 right-2.5 p-2.5 font-bold text-sm text-gray-500">0
                                    kí tự</span>
                            </div>
                            <div class="flex items-center justify-center space-x-4">
                                <button type="button" data-base64-action="encode"
                                    class="px-4 py-2 text-sm font-semibold text-white bg-red-700 rounded-lg hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 dark:bg-red-600 dark:hover:bg-red-700 dark:focus:ring-red-800">Encode</button>
                                <button type="button" data-base64-action="decode"
                                    class="px-4 py-2 text-sm font-semibold text-white bg-green-700 rounded-lg hover:bg-green-800 focus:ring-4 focus:outline-none focus:ring-green-300 dark:bg-green-600 dark:hover:bg-green-700 dark:focus:ring-green-800">Decode</button>
                            </div>
                        </div>
                        <div id="base64Output"
                            class="flex-col items-center justify-center p-4 py-8 mt-4 bg-gray-100 border-2 border-red-400 rounded-lg dark:bg-gray-800">
                            <span class="text-lg font-bold">Base64 Output ✍️</span>
                            <textarea rows="8"
                                class="mt-2 block p-2.5 pb-8 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                readonly></textarea>
                        </div>
                    </div>
                    <!--UTF8 APP-->
                    <div class="flex-1 hidden mt-10 overflow-y-auto xl:px-5 md:mt-0" id="utf8_APP">
                        <div id="utf8Input"
                            class="p-4 space-y-3 border-2 border-orange-500 rounded-lg dark:border-orange-800">
                            <div class="relative w-full">
                                <textarea rows="6" name="utf8NoiDung"
                                    class="textarea_counter block p-2.5 pb-8 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                    placeholder="Nội dung cần Encode/Decode..."></textarea>
                                <span
                                    class="char_counter absolute bottom-0 right-2.5 p-2.5 font-bold text-sm text-gray-500">0
                                    kí tự</span>
                            </div>
                            <div class="flex items-center justify-center space-x-4">
                                <button type="button" data-utf8-action="encode"
                                    class="px-4 py-2 text-sm font-semibold text-white bg-red-700 rounded-lg hover:bg-red-800 focus:ring-4 focus:outline-none focus:ring-red-300 dark:bg-red-600 dark:hover:bg-red-700 dark:focus:ring-red-800">Encode</button>
                                <button type="button" data-utf8-action="decode"
                                    class="px-4 py-2 text-sm font-semibold text-white bg-green-700 rounded-lg hover:bg-green-800 focus:ring-4 focus:outline-none focus:ring-green-300 dark:bg-green-600 dark:hover:bg-green-700 dark:focus:ring-green-800">Decode</button>
                            </div>
                        </div>
                        <div id="utf8Output"
                            class="flex-col items-center justify-center p-4 py-8 mt-4 bg-gray-100 border-2 border-red-400 rounded-lg dark:bg-gray-800">
                            <div class="flex items-end justify-between">
                                <span class="text-lg font-bold">UTF-8 Output ✍️</span>
                                <div class="exportTXT"></div>
                            </div>
                            <textarea rows="8"
                                class="mt-2 block p-2.5 pb-8 w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                readonly></textarea>
                        </div>
                    </div>
                </div>
            </main>
            <footer></footer>
        </div>
    </div>
</body>
<script src="https://jsdelivr.b-cdn.net/npm/flowbite@2.4.1/dist/flowbite.min.js"></script>
<script src="https://jsdelivr.b-cdn.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
<script src="https://jsdelivr.b-cdn.net/npm/easyqrcodejs@4.6.1/dist/easy.qrcode.min.js"></script>
<script src="https://jsdelivr.b-cdn.net/npm/jssha@3.3.1/dist/sha.min.js"></script>
<script src="/assets/js/tien-ich.js"></script>

</html>
